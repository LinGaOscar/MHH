spring:
  application:
    name: mhh-batch
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=MHH_DB;encrypt=true;trustServerCertificate=true
    username: sa
    password: YourPassword123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

mhh:
  jobs:
    refresh-rate: 20m # 每 20 分鐘同步一次 JOBS_CONF
  
  # SWAL (Oracle) 為外部資料庫
  swal:
    datasource:
      url: jdbc:oracle:thin:@//localhost:1521/XEPDB1
      username: SWAL_USER
      password: SWAL_PASSWORD
      driver-class-name: oracle.jdbc.OracleDriver
  
  # PDF 解析路徑
  paths:
    mx: d:/MHH_FILES/MX
    mt: d:/MHH_FILES/MT
    archive: d:/MHH_FILES/ARCHIVE
    error: d:/MHH_FILES/ERROR
    logs: d:/MHH_FILES/LOGS
