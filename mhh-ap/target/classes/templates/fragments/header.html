<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="header" class="header">
        <div class="user-info">
            <div class="user-details">
                <span class="user-name" th:text="${#authentication.name}">Admin</span>
                <span class="user-role" th:text="${#authentication.authorities}">ROLE_ADMIN</span>
            </div>
            <div class="avatar">
                <span th:text="${#strings.substring(#authentication.name,0,1).toUpperCase()}">A</span>
            </div>
        </div>
    </header>
</body>
</html>
