<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <aside th:fragment="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img th:src="@{/images/logo.png}" alt="Logo" class="logo-img">
            <span class="logo-text">MHH</span>
        </div>
        
        <nav class="sidebar-menu">
            <!-- Dashboard -->
            <a th:href="@{/dashboard}" class="menu-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-speedometer2"></i>
                <span th:text="#{menu.home}">Dashboard</span>
            </a>

            <!-- Message Management Group -->
            <div class="menu-group">
                <div class="menu-item submenu-parent" onclick="this.nextElementSibling.classList.toggle('show')">
                    <i class="bi bi-envelope-paper"></i>
                    <span>電文管理</span>
                    <i class="bi bi-chevron-down ms-auto" style="font-size: 0.8rem"></i>
                </div>
                <div class="submenu" th:classappend="${activeGroup == 'message' ? 'show' : ''}">
                    <a th:href="@{/incoming}" class="submenu-item" th:classappend="${activePage == 'incoming' ? 'active' : ''}">
                        <i class="bi bi-arrow-down-circle me-2"></i>進電文查詢
                    </a>
                    <a th:href="@{/outgoing}" class="submenu-item" th:classappend="${activePage == 'outgoing' ? 'active' : ''}">
                        <i class="bi bi-arrow-up-circle me-2"></i>出電文查詢
                    </a>
                    <a th:href="@{/download}" class="submenu-item">
                        <i class="bi bi-download me-2"></i>下載中心
                    </a>
                    <a th:href="@{/release}" class="submenu-item">
                        <i class="bi bi-shield-check me-2"></i>電文放行
                    </a>
                </div>
            </div>

            <!-- Task Management Group -->
            <div class="menu-group">
                <div class="menu-item submenu-parent" onclick="this.nextElementSibling.classList.toggle('show')">
                    <i class="bi bi-list-task"></i>
                    <span>工作流</span>
                    <i class="bi bi-chevron-down ms-auto" style="font-size: 0.8rem"></i>
                </div>
                <div class="submenu" th:classappend="${activeGroup == 'task' ? 'show' : ''}">
                    <a th:href="@{/tasks/todo}" class="submenu-item">
                        <i class="bi bi-clock-history me-2"></i>待辦事項
                    </a>
                    <a th:href="@{/tasks/history}" class="submenu-item">
                        <i class="bi bi-archive me-2"></i>歷史紀錄
                    </a>
                </div>
            </div>

            <!-- Admin Group -->
            <div class="menu-group" sec:authorize="hasRole('ADMIN')">
                <div class="menu-item submenu-parent" onclick="this.nextElementSibling.classList.toggle('show')">
                    <i class="bi bi-gear"></i>
                    <span>系統管理</span>
                    <i class="bi bi-chevron-down ms-auto" style="font-size: 0.8rem"></i>
                </div>
                <div class="submenu" th:classappend="${activeGroup == 'admin' ? 'show' : ''}">
                    <a th:href="@{/admin/users}" class="submenu-item">
                        <i class="bi bi-people me-2"></i>使用者管理
                    </a>
                    <a th:href="@{/admin/jobs}" class="submenu-item">
                        <i class="bi bi-cpu me-2"></i>排程監控
                    </a>
                </div>
            </div>
        </nav>

        <div class="sidebar-footer p-3 border-top" style="border-color: var(--border-color)">
            <a th:href="@{/logout}" class="menu-item text-danger" style="margin-bottom: 0">
                <i class="bi bi-box-arrow-left"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>
</body>
</html>
