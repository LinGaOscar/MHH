<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<body>
    <div layout:fragment="content">
        <h2>Dashboard</h2>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">To-Do Tasks</div>
                    <div class="card-body">
                        <p>No pending tasks.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Download Progress</div>
                    <div class="card-body">
                        <p>No active downloads.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
