<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<body>
    <div layout:fragment="content" th:with="activePage='dashboard'">
        <div class="mb-4">
            <h2 class="fw-bold">系統概覽</h2>
            <p class="text-muted">歡迎回來，這是您今日的數據摘要。</p>
        </div>

        <!-- Summary Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card-premium">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="stat-icon cyan"><i class="bi bi-envelope-at"></i></div>
                        <span class="badge-custom bg-status-success">Today</span>
                    </div>
                    <h3 class="h2 fw-bold mb-1">1,284</h3>
                    <p class="text-muted small mb-0">今日同步電文總數</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-premium">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="stat-icon amber"><i class="bi bi-clock-history"></i></div>
                        <span class="badge-custom bg-status-pending">Pending</span>
                    </div>
                    <h3 class="h2 fw-bold mb-1">12</h3>
                    <p class="text-muted small mb-0">待辦審核任務</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-premium">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="stat-icon sky"><i class="bi bi-file-earmark-pdf"></i></div>
                    </div>
                    <h3 class="h2 fw-bold mb-1">45</h3>
                    <p class="text-muted small mb-0">PDF 合併作業中</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-premium">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
                    </div>
                    <h3 class="h2 fw-bold mb-1">98%</h3>
                    <p class="text-muted small mb-0">系統運行健康度</p>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card-premium h-100">
                    <h5 class="fw-bold mb-4">近期系統活動</h5>
                    <div class="table-responsive">
                        <table class="table table-hover border-0 dashboard-table">
                            <thead>
                                <tr class="text-muted small">
                                    <th>時間</th>
                                    <th>操作類型</th>
                                    <th>狀態</th>
                                    <th>詳情</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>10:45</td>
                                    <td>SwallowSync</td>
                                    <td><span class="badge-custom bg-status-success">Success</span></td>
                                    <td>同步 423 筆電文</td>
                                </tr>
                                <tr>
                                    <td>09:30</td>
                                    <td>PDF Merge</td>
                                    <td><span class="badge-custom bg-status-pending">Running</span></td>
                                    <td>REF20260330001</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card-premium h-100">
                    <h5 class="fw-bold mb-4">快速功能</h5>
                    <div class="d-grid gap-2">
                        <a th:href="@{/query}" class="btn btn-outline-primary text-start p-3 border-secondary">
                            <i class="bi bi-search me-2"></i> 即刻查詢電文
                        </a>
                        <a th:href="@{/download}" class="btn btn-outline-info text-start p-3 border-secondary">
                            <i class="bi bi-download me-2"></i> 檢查下載進度
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
