<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<body>
    <div layout:fragment="content" th:with="activePage='query', activeGroup='message'">
        <div class="mb-4">
            <h2 class="fw-bold">電文查詢</h2>
            <p class="text-muted">根據日期、渠道或關鍵字搜尋歷史紀錄。</p>
        </div>

        <div class="card-premium mb-4">
            <form class="row g-3">
                <div class="col-md-4">
                    <label class="form-label text-muted small">起迄日期</label>
                    <input type="date" class="form-control bg-dark border-secondary text-white">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small">電文渠道</label>
                    <select class="form-select bg-dark border-secondary text-white">
                        <option>ALL</option>
                        <option>SWALLOW</option>
                        <option>FTP_PDF</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small">關鍵字</label>
                    <input type="text" class="form-control bg-dark border-secondary text-white" placeholder="輸入電文序號...">
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary px-5">
                        <i class="bi bi-search me-2"></i> 搜尋
                    </button>
                </div>
            </form>
        </div>

        <div class="card-premium">
            <div class="text-center py-5">
                <i class="bi bi-inbox text-muted display-1"></i>
                <p class="mt-3 text-muted">請輸入條件後開始搜尋</p>
            </div>
        </div>
    </div>
</body>
</html>
